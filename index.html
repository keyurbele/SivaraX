<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SivaraX</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SETUP -->
<div id="setupOverlay">
  <div class="setup-card">
    <h2>Welcome to SivaraX</h2>

    <input type="text" id="nameInput" placeholder="your name...">

    <div class="setup-btns">
      <button onclick="setVoice('female', this)">female</button>
      <button onclick="setVoice('male', this)">male</button>
    </div>

    <button id="finishSetup">start</button>
  </div>
</div>

<!-- LANDING -->
<div class="landing-page">
  <h1>SivaraX</h1>
  <p>talk to someone</p>

  <button id="chatBtn">chat</button>
  <button id="talkBtn">talk</button>
</div>

<!-- CHAT -->
<div class="chat-page">

  <div class="chat-header">
    <button id="backBtn">back</button>
    <h2>SivaraX</h2>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('listener', this)">listener</button>
    <button class="mode-btn" onclick="setMode('reality', this)">reality</button>
    <button class="mode-btn" onclick="setMode('feedback', this)">feedback</button>
  </div>

  <div id="chatWindow"></div>

  <div id="siriWave"></div>

  <div class="input-container">
    <input id="userInput" placeholder="type..." />
    <button id="sendBtn">→</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
