<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SivaraX - AI That Listens Without Judgment</title>
  <meta name="description" content="SivaraX is a friendly AI chatbot that listens, supports, and helps you vent safely without judgment.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="landing-page">
    <h1>SivaraX</h1>
    <p>The AI that listens without judgment</p>
    <button id="chatBtn">Chat</button>
    <button id="talkBtn">Talk</button>
  </div>

  <div class="chat-page" style="display:none;">
    <div id="chatWindow"></div>
    <input type="text" id="userInput" placeholder="Type your message...">
    <button id="sendBtn">Send</button>
    <button id="backBtn">Back</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
