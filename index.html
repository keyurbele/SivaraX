<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SivaraX - AI That Listens Without Judgment</title>
  <meta name="description" content="SivaraX is a friendly AI chatbot that listens, supports, and helps you vent safely without judgment.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="landing-page">
    <div class="hero-content">
      <h1>SivaraX</h1>
      <p>the ai that actually listens.</p>
      <div class="landing-btns">
        <button id="chatBtn">chat</button>
        <button id="talkBtn">talk</button>
      </div>
    </div>
  </div>

  <div class="chat-page" style="display:none;">
    <button id="backBtn">back</button>
    <h1>SivaraX</h1>
    
    <div id="chatWindow">
      </div>

    <div class="input-container">
      <input type="text" id="userInput" placeholder="type smth..." autocomplete="off">
      <button id="sendBtn">↑</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
